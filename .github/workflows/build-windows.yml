name: Build MAWAQIT Player (Maximum Compression)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # === JOB 1: Linux - Trim Android system and recompress ===
  trim-android:
    runs-on: ubuntu-latest
    steps:
    - name: Install tools
      run: sudo apt-get install -y squashfs-tools p7zip-full

    - name: Download Android-x86 ISO
      run: |
        echo "Downloading Android-x86 9.0 32-bit..."
        MIRRORS=(
          "https://netcologne.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86-9.0-r2.iso"
          "https://netix.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86-9.0-r2.iso"
          "https://kumisystems.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86-9.0-r2.iso"
          "https://phoenixnap.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86-9.0-r2.iso"
          "https://jaist.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86-9.0-r2.iso"
        )
        for url in "${MIRRORS[@]}"; do
          echo "Trying: $url"
          if curl -L -o android.iso --retry 2 --connect-timeout 30 --max-time 900 "$url"; then
            SIZE=$(stat -c%s android.iso 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 500000000 ]; then
              echo "Download OK! Size: $((SIZE/1048576)) MB"
              break
            fi
          fi
          rm -f android.iso
        done
        [ -f android.iso ] || exit 1

    - name: Extract and trim Android system
      run: |
        # Extract ISO
        7z x android.iso -oiso_extract -y
        rm android.iso
        
        ls -la iso_extract/
        
        # Find system.sfs
        SYSTEM_SFS=$(find iso_extract -name "system.sfs" -o -name "system.img" | head -1)
        echo "Found: $SYSTEM_SFS"
        echo "Original size: $(du -h $SYSTEM_SFS | cut -f1)"
        
        # Extract squashfs
        sudo unsquashfs -d system_root "$SYSTEM_SFS"
        
        echo "=== Before trimming ==="
        du -sh system_root/
        
        # === REMOVE BLOAT APPS (not needed for MAWAQIT) ===
        echo "Removing unnecessary apps..."
        
        # Remove from /system/app/
        for app in Browser2 Calendar Camera2 Calculator Clock DeskClock \
                   Email ExactCalculator Gallery2 HTMLViewer Music \
                   QuickSearchBox SoundRecorder LatinIME OpenWnn \
                   PicoTts BasicDreams LiveWallpapers \
                   LiveWallpapersPicker MagicSmokeWallpapers \
                   VisualizationWallpapers WallpaperPicker \
                   PhotoTable Provision; do
          rm -rf system_root/app/${app}* 2>/dev/null && echo "  Removed app/$app"
        done
        
        # Remove from /system/priv-app/
        for app in Browser2 Calendar Camera2 Contacts Dialer \
                   Email Gallery2 Music Telecomm TeleService \
                   CallLogBackup ManagedProvisioning \
                   MusicFX Tag CellBroadcastReceiver; do
          rm -rf system_root/priv-app/${app}* 2>/dev/null && echo "  Removed priv-app/$app"
        done
        
        # Remove media bloat
        rm -rf system_root/media/wallpaper* 2>/dev/null
        rm -rf system_root/media/audio/ringtones/* 2>/dev/null
        rm -rf system_root/media/audio/notifications/* 2>/dev/null
        rm -rf system_root/media/audio/alarms/* 2>/dev/null
        rm -rf system_root/media/bootanimation.zip 2>/dev/null
        echo "  Removed media bloat"
        
        # Remove unnecessary fonts (keep Roboto + Noto for Arabic)
        find system_root/fonts/ -name "*.ttf" \
          ! -name "Roboto*" \
          ! -name "NotoSans*" \
          ! -name "NotoNaskh*" \
          ! -name "NotoColorEmoji*" \
          ! -name "DroidSans*" \
          -delete 2>/dev/null
        echo "  Trimmed fonts"
        
        # Remove test/sample data
        rm -rf system_root/xbin/* 2>/dev/null
        rm -rf system_root/usr/share/bmd 2>/dev/null
        
        echo "=== After trimming ==="
        du -sh system_root/
        
        # === REPACK with XZ compression (much better than gzip) ===
        echo "Repacking with XZ compression (this takes a while)..."
        sudo mksquashfs system_root system_trimmed.sfs \
          -comp xz \
          -Xbcj x86 \
          -b 1048576 \
          -no-xattrs \
          -no-exports
        
        echo "Original system: $(du -h $SYSTEM_SFS | cut -f1)"
        echo "Trimmed system:  $(du -h system_trimmed.sfs | cut -f1)"
        
        # Prepare output: kernel + initrd + trimmed system
        mkdir android_files
        find iso_extract -name "kernel" | head -1 | xargs -I{} cp {} android_files/
        find iso_extract -name "initrd.img" | head -1 | xargs -I{} cp {} android_files/
        find iso_extract -name "ramdisk.img" | head -1 | xargs -I{} cp {} android_files/ 2>/dev/null
        cp system_trimmed.sfs android_files/system.sfs
        
        echo "=== Final android_files ==="
        ls -lh android_files/
        du -sh android_files/

    - name: Upload trimmed Android files
      uses: actions/upload-artifact@v4
      with:
        name: android-trimmed
        path: android_files/
        retention-days: 1
        compression-level: 0

  # === JOB 2: Windows - Build EXE and package ===
  build:
    runs-on: windows-latest
    needs: trim-android
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download trimmed Android files
      uses: actions/download-artifact@v4
      with:
        name: android-trimmed
        path: package/android

    - name: Show Android files
      run: |
        Get-ChildItem "package\android" -Recurse | ForEach-Object {
          Write-Host "$($_.Name): $([math]::Round($_.Length/1MB,1)) MB"
        }

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile --windowed --name "XAPK-Player" xapk_player.py

    - name: Download ADB (minimal)
      run: |
        Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile "pt.zip"
        Expand-Archive "pt.zip" -DestinationPath "temp_pt" -Force
        mkdir "package\platform-tools" -ErrorAction SilentlyContinue
        Copy-Item "temp_pt\platform-tools\adb.exe" "package\platform-tools\"
        Copy-Item "temp_pt\platform-tools\AdbWinApi.dll" "package\platform-tools\"
        Copy-Item "temp_pt\platform-tools\AdbWinUsbApi.dll" "package\platform-tools\"
        Remove-Item "pt.zip","temp_pt" -Recurse -Force -ErrorAction SilentlyContinue

    - name: Download and strip QEMU
      run: |
        Invoke-WebRequest -Uri "https://github.com/dirkarnez/qemu-portable/releases/download/20240822/qemu-w64-portable-20240822.zip" -OutFile "qemu.zip"
        Expand-Archive "qemu.zip" -DestinationPath "temp_qemu" -Force
        Remove-Item "qemu.zip" -Force

        $qRoot = "temp_qemu"
        if (-not (Test-Path "$qRoot\qemu-system-x86_64.exe")) {
          $sub = Get-ChildItem $qRoot -Directory | Select-Object -First 1
          if ($sub) { $qRoot = $sub.FullName }
        }

        mkdir "package\qemu" -ErrorAction SilentlyContinue

        # Only x86_64 executables
        Copy-Item "$qRoot\qemu-system-x86_64.exe" "package\qemu\"
        Copy-Item "$qRoot\qemu-img.exe" "package\qemu\"
        Get-ChildItem "$qRoot\*.dll" | Copy-Item -Destination "package\qemu\"

        # Essential firmware only
        if (Test-Path "$qRoot\share") {
          mkdir "package\qemu\share" -ErrorAction SilentlyContinue
          @("bios-256k.bin","bios.bin","vgabios-virtio.bin","vgabios-stdvga.bin",
            "vgabios.bin","efi-virtio.rom","kvmvapic.bin","linuxboot.bin",
            "linuxboot_dma.bin","efi-e1000.rom","keymaps"
          ) | ForEach-Object {
            $src = "$qRoot\share\$_"
            if (Test-Path $src) { Copy-Item $src "package\qemu\share\" -Recurse }
          }
        }
        Remove-Item "temp_qemu" -Recurse -Force -ErrorAction SilentlyContinue

        $s = (Get-ChildItem "package\qemu" -Recurse | Measure-Object Length -Sum).Sum/1MB
        Write-Host "Stripped QEMU: $([math]::Round($s,1)) MB"

    - name: Assemble Package
      run: |
        Copy-Item "dist\XAPK-Player.exe" "package\XAPK-Player.exe"
        mkdir "package\data" -ErrorAction SilentlyContinue

    - name: UPX compress all binaries
      run: |
        Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip" -OutFile "upx.zip"
        Expand-Archive "upx.zip" -DestinationPath "upx_temp" -Force
        $upx = (Get-ChildItem "upx_temp" -Recurse -Filter "upx.exe" | Select-Object -First 1).FullName

        Get-ChildItem "package" -Recurse -Include "*.exe","*.dll" | Where-Object { $_.Length -gt 500KB } | ForEach-Object {
          $before = $_.Length/1MB
          & $upx --best --lzma $_.FullName 2>$null
          $after = (Get-Item $_.FullName).Length/1MB
          Write-Host "  $($_.Name): $([math]::Round($before,1))MB -> $([math]::Round($after,1))MB"
        }
        Remove-Item "upx.zip","upx_temp" -Recurse -Force -ErrorAction SilentlyContinue

    - name: Show package breakdown
      run: |
        Write-Host "`n=== PACKAGE BREAKDOWN ==="
        $total = 0
        Get-ChildItem "package" | ForEach-Object {
          if ($_.PSIsContainer) {
            $s = (Get-ChildItem $_.FullName -Recurse | Measure-Object Length -Sum).Sum/1MB
          } else { $s = $_.Length/1MB }
          $total += $s
          Write-Host "  $($_.Name): $([math]::Round($s,1)) MB"
        }
        Write-Host "  TOTAL (before 7z): $([math]::Round($total,1)) MB"

    - name: 7z MAXIMUM compression
      run: |
        & "C:\Program Files\7-Zip\7z.exe" a -t7z -m0=lzma2 -mx=9 -mfb=273 -md=256m -ms=on -mqs=on -mmt=2 "MAWAQIT-Player.7z" ".\package\*"
        $sz = (Get-Item "MAWAQIT-Player.7z").Length/1MB
        Write-Host "`n==========================================="
        Write-Host "  FINAL ARCHIVE: $([math]::Round($sz,1)) MB"
        Write-Host "==========================================="

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MAWAQIT-Player
        path: MAWAQIT-Player.7z
        retention-days: 30

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      with:
        keep_latest: 0
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v3.1.0
        name: "MAWAQIT Player v3.1.0 - Ultra Compressed"
        body: |
          ## MAWAQIT Player 📱
          
          حزمة مضغوطة بأقصى ضغط ممكن!
          
          ### التحسينات:
          - 🔧 Android مُقلّص (حذف التطبيقات الزائدة)
          - 🗜️ إعادة ضغط النظام بـ XZ (أقوى من gzip)
          - ✂️ QEMU مصغّر + UPX
          - 📦 7z LZMA2 Ultra
        files: MAWAQIT-Player.7z
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
