name: Build MAWAQIT Player (Optimized)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile --windowed --name "XAPK-Player" xapk_player.py

    - name: Download ADB (minimal - 3 files only)
      run: |
        Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile "pt.zip"
        Expand-Archive -Path "pt.zip" -DestinationPath "temp_pt" -Force
        mkdir "package\platform-tools" -ErrorAction SilentlyContinue
        # Only 3 files needed for ADB
        Copy-Item "temp_pt\platform-tools\adb.exe" "package\platform-tools\"
        Copy-Item "temp_pt\platform-tools\AdbWinApi.dll" "package\platform-tools\"
        Copy-Item "temp_pt\platform-tools\AdbWinUsbApi.dll" "package\platform-tools\"
        Remove-Item "pt.zip","temp_pt" -Recurse -Force -ErrorAction SilentlyContinue
        $s = (Get-ChildItem "package\platform-tools" -Recurse | Measure-Object Length -Sum).Sum/1MB
        Write-Host "ADB: $([math]::Round($s,1)) MB"

    - name: Download and strip QEMU (x86_64 only)
      run: |
        Invoke-WebRequest -Uri "https://github.com/dirkarnez/qemu-portable/releases/download/20240822/qemu-w64-portable-20240822.zip" -OutFile "qemu.zip"
        Expand-Archive -Path "qemu.zip" -DestinationPath "temp_qemu" -Force
        Remove-Item "qemu.zip" -Force

        $qRoot = "temp_qemu"
        if (-not (Test-Path "$qRoot\qemu-system-x86_64.exe")) {
          $sub = Get-ChildItem $qRoot -Directory | Select-Object -First 1
          if ($sub) { $qRoot = $sub.FullName }
        }
        $fullSize = (Get-ChildItem $qRoot -Recurse | Measure-Object Length -Sum).Sum/1MB
        Write-Host "Full QEMU: $([math]::Round($fullSize,1)) MB"

        mkdir "package\qemu" -ErrorAction SilentlyContinue

        # Only x86_64 emulator + image tool
        Copy-Item "$qRoot\qemu-system-x86_64.exe" "package\qemu\"
        Copy-Item "$qRoot\qemu-img.exe" "package\qemu\"

        # All shared DLLs (needed by the exe)
        Get-ChildItem "$qRoot\*.dll" | Copy-Item -Destination "package\qemu\"

        # Essential x86 firmware only
        if (Test-Path "$qRoot\share") {
          mkdir "package\qemu\share" -ErrorAction SilentlyContinue
          @("bios-256k.bin","bios.bin","vgabios-virtio.bin","vgabios-stdvga.bin",
            "vgabios.bin","efi-virtio.rom","kvmvapic.bin","linuxboot.bin",
            "linuxboot_dma.bin","efi-e1000.rom","efi-e1000e.rom","keymaps"
          ) | ForEach-Object {
            $src = "$qRoot\share\$_"
            if (Test-Path $src) {
              Copy-Item $src "package\qemu\share\" -Recurse
            }
          }
        }

        Remove-Item "temp_qemu" -Recurse -Force -ErrorAction SilentlyContinue
        $minSize = (Get-ChildItem "package\qemu" -Recurse | Measure-Object Length -Sum).Sum/1MB
        Write-Host "Stripped QEMU: $([math]::Round($minSize,1)) MB (saved $([math]::Round($fullSize-$minSize,1)) MB)"

    - name: Download Android-x86 and extract essentials
      run: |
        # Use 32-bit ISO (726 MB vs 921 MB for 64-bit = 200 MB saved)
        Write-Host "Downloading Android-x86 9.0 (32-bit)..."
        
        # Direct CDN mirror URLs (bypass SourceForge Cloudflare)
        $mirrors = @(
          "https://netcologne.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86-9.0-r2.iso",
          "https://netix.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86-9.0-r2.iso",
          "https://kumisystems.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86-9.0-r2.iso",
          "https://phoenixnap.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86-9.0-r2.iso",
          "https://jaist.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86-9.0-r2.iso",
          "https://osdn.net/dl/android-x86/android-x86-9.0-r2.iso"
        )
        
        $downloaded = $false
        foreach ($url in $mirrors) {
          Write-Host "Trying: $url"
          try {
            curl.exe -L -o "android.iso" -# --retry 2 --retry-delay 3 --connect-timeout 30 --max-time 600 "$url"
            if ((Test-Path "android.iso") -and (Get-Item "android.iso").Length -gt 500MB) {
              $downloaded = $true
              Write-Host "Download OK! Size: $([math]::Round((Get-Item 'android.iso').Length/1MB,1)) MB"
              break
            }
            Write-Host "File too small or missing, trying next..."
            Remove-Item "android.iso" -ErrorAction SilentlyContinue
          } catch {
            Write-Host "Mirror failed: $_"
          }
        }
        
        if (-not $downloaded) { throw "All mirrors failed! Check network." }
        
        $isoSize = (Get-Item "android.iso").Length/1MB
        Write-Host "ISO size: $([math]::Round($isoSize,1)) MB"
        
        # Extract only essential boot files (skip bootloader/EFI/installer)
        Write-Host "Extracting essential files from ISO..."
        & "C:\Program Files\7-Zip\7z.exe" x "android.iso" -o"iso_extract" -y
        
        mkdir "package\android" -ErrorAction SilentlyContinue
        
        # Copy only what's needed to boot Android
        $essentials = @("kernel","initrd.img","ramdisk.img","system.sfs","system.img")
        foreach ($f in $essentials) {
          # Files might be at root or in subdirectory
          $found = Get-ChildItem "iso_extract" -Recurse -Filter $f | Select-Object -First 1
          if ($found) {
            Copy-Item $found.FullName "package\android\"
            Write-Host "  Kept: $f ($([math]::Round($found.Length/1MB,1)) MB)"
          }
        }
        
        Remove-Item "android.iso","iso_extract" -Recurse -Force -ErrorAction SilentlyContinue
        
        $androidSize = (Get-ChildItem "package\android" -Recurse | Measure-Object Length -Sum).Sum/1MB
        Write-Host "Android essentials: $([math]::Round($androidSize,1)) MB (saved bootloader/EFI/installer overhead)"

    - name: Assemble Package
      run: |
        Copy-Item "dist\XAPK-Player.exe" "package\XAPK-Player.exe"
        mkdir "package\data" -ErrorAction SilentlyContinue
        
        @"
        ===================================
        XAPK Player - مشغل تطبيقات أندرويد
        ===================================
        
        الاستخدام:
        1. شغّل XAPK-Player.exe
        2. اختر ملف XAPK أو APK
        3. اضغط تشغيل
        
        كل شيء مدمج - لا يحتاج تحميل أو تثبيت!
        "@ | Out-File "package\README.txt" -Encoding UTF8
        
        Write-Host "`n=== PACKAGE BREAKDOWN ==="
        $total = 0
        Get-ChildItem "package" | ForEach-Object {
          if ($_.PSIsContainer) {
            $s = (Get-ChildItem $_.FullName -Recurse | Measure-Object Length -Sum).Sum/1MB
          } else { $s = $_.Length/1MB }
          $total += $s
          Write-Host "  $($_.Name): $([math]::Round($s,1)) MB"
        }
        Write-Host "  TOTAL: $([math]::Round($total,1)) MB"

    - name: Compress EXEs with UPX (shrink binaries 50-70%)
      run: |
        # Download UPX
        Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip" -OutFile "upx.zip"
        Expand-Archive "upx.zip" -DestinationPath "upx_temp" -Force
        $upx = (Get-ChildItem "upx_temp" -Recurse -Filter "upx.exe" | Select-Object -First 1).FullName
        
        Write-Host "=== Compressing EXE/DLL files with UPX ==="
        
        # Compress all EXE files
        Get-ChildItem "package" -Recurse -Filter "*.exe" | ForEach-Object {
          $before = $_.Length/1MB
          & $upx --best --lzma $_.FullName 2>$null
          $after = (Get-Item $_.FullName).Length/1MB
          Write-Host "  $($_.Name): $([math]::Round($before,1))MB -> $([math]::Round($after,1))MB"
        }
        
        # Compress large DLL files (>1MB)
        Get-ChildItem "package" -Recurse -Filter "*.dll" | Where-Object { $_.Length -gt 1MB } | ForEach-Object {
          $before = $_.Length/1MB
          & $upx --best --lzma $_.FullName 2>$null
          $after = (Get-Item $_.FullName).Length/1MB
          Write-Host "  $($_.Name): $([math]::Round($before,1))MB -> $([math]::Round($after,1))MB"
        }
        
        Remove-Item "upx.zip","upx_temp" -Recurse -Force -ErrorAction SilentlyContinue
        
        $newTotal = (Get-ChildItem "package" -Recurse | Measure-Object Length -Sum).Sum/1MB
        Write-Host "Package after UPX: $([math]::Round($newTotal,1)) MB"

    - name: Create 7z MAXIMUM Compressed Package
      run: |
        # ABSOLUTE MAXIMUM 7z compression settings:
        # -m0=lzma2    : LZMA2 algorithm (best for mixed content)
        # -mx=9        : Ultra compression level
        # -mfb=273     : Maximum fast bytes (word size)
        # -md=512m     : 512MB dictionary (huge = better compression)
        # -ms=on       : Solid archive (compress files together)
        # -mqs=on      : Sort files by type (better solid compression)
        # -mmt=2       : 2 threads (fewer = slightly better compression)
        & "C:\Program Files\7-Zip\7z.exe" a -t7z -m0=lzma2 -mx=9 -mfb=273 -md=512m -ms=on -mqs=on -mmt=2 "MAWAQIT-Player.7z" ".\package\*"
        
        $sz = (Get-Item "MAWAQIT-Player.7z").Length/1MB
        Write-Host "`n==========================================="
        Write-Host "  FINAL ARCHIVE: $([math]::Round($sz,1)) MB"
        Write-Host "==========================================="

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MAWAQIT-Player
        path: MAWAQIT-Player.7z
        retention-days: 30

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      with:
        keep_latest: 0
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v3.0.0
        name: "MAWAQIT Player v3.0.0"
        body: |
          ## MAWAQIT Player 📱
          
          حزمة مُحسّنة وخفيفة - كل شيء مدمج!
          
          ### التحسينات:
          - 🗜️ ضغط 7z LZMA2 Ultra
          - ✂️ QEMU مصغّر (x86_64 فقط)
          - 📦 Android 32-bit (أخف)
          - 🚀 ملفات التشغيل الأساسية فقط
          
          ### الاستخدام:
          1. حمّل `MAWAQIT-Player.7z`
          2. فك الضغط
          3. شغّل `XAPK-Player.exe`
        files: MAWAQIT-Player.7z
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
