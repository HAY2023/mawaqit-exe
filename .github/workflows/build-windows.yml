name: Build and Release MAWAQIT

on:
  workflow_dispatch: # Allows manual trigger from Actions tab
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Important: gives the action permission to upload to releases

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build MAWAQIT EXE
      run: |
        pyinstaller --onefile --windowed --name MAWAQIT mawaqit.py

    - name: Upload EXE to Latest Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Fetch the latest release tag (works in Windows runner PowerShell)
        $LATEST_TAG = gh release view --json tagName --jq .tagName
        echo "Uploading to release: $LATEST_TAG"
        # Upload the executable
        gh release upload $LATEST_TAG dist/MAWAQIT.exe --clobber
