name: Build MAWAQIT XAPK Player

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install pyinstaller Pillow

    - name: Create App Icon
      run: |
        python -c "
        from PIL import Image, ImageDraw
        import math
        size = 256
        img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
        draw = ImageDraw.Draw(img)
        cx, cy = size // 2, size // 2
        draw.ellipse([10, 10, size-10, size-10], outline='#5B2D8E', width=8)
        for i in range(12):
            angle = math.radians(i * 30 - 90)
            x = cx + 100 * math.cos(angle)
            y = cy + 100 * math.sin(angle)
            dot_r = 6 if i % 3 == 0 else 4
            draw.ellipse([x-dot_r, y-dot_r, x+dot_r, y+dot_r], fill='#5B2D8E')
        draw.line([(cx, cy), (cx, cy-55)], fill='#5B2D8E', width=6)
        draw.line([(cx, cy), (cx+40, cy+30)], fill='#5B2D8E', width=5)
        draw.ellipse([cx-8, cy-8, cx+8, cy+8], fill='#5B2D8E')
        img.save('app.ico', format='ICO', sizes=[(256,256),(64,64),(32,32),(16,16)])
        "

    - name: Build XAPK Player EXE
      run: pyinstaller --onefile --windowed --name "MAWAQIT-Player" --icon=app.ico xapk_player.py

    - name: Download ADB (minimal)
      run: |
        curl -L -o pt.zip "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
        Expand-Archive pt.zip -DestinationPath "package" -Force
        Remove-Item pt.zip
        Get-ChildItem "package/platform-tools" -Exclude "adb.exe","AdbWinApi.dll","AdbWinUsbApi.dll" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

    - name: Download and Trim QEMU
      run: |
        curl -L -o qemu.zip "https://github.com/dirkarnez/qemu-portable/releases/download/20240822/qemu-w64-portable-20240822.zip"
        Expand-Archive qemu.zip -DestinationPath "temp_qemu" -Force
        Remove-Item qemu.zip
        $qemuExe = Get-ChildItem "temp_qemu" -Recurse -Filter "qemu-system-x86_64.exe" | Select-Object -First 1
        $srcDir = $qemuExe.DirectoryName
        mkdir "package/qemu" -ErrorAction SilentlyContinue
        Copy-Item "$srcDir/qemu-system-x86_64.exe" "package/qemu/"
        Copy-Item "$srcDir/qemu-img.exe" "package/qemu/" -ErrorAction SilentlyContinue
        Get-ChildItem "$srcDir" -Filter "*.dll" | Copy-Item -Destination "package/qemu/"
        mkdir "package/qemu/share" -ErrorAction SilentlyContinue
        @("bios-256k.bin","efi-virtio.rom","kvmvapic.bin","vgabios-virtio.bin","vgabios-stdvga.bin","efi-e1000.rom") | ForEach-Object {
          $f = Get-ChildItem "temp_qemu" -Recurse -Filter $_ | Select-Object -First 1
          if ($f) { Copy-Item $f.FullName "package/qemu/share/" }
        }
        Remove-Item "temp_qemu" -Recurse -Force

    - name: Download Android-x86 ISO (with resume)
      timeout-minutes: 30
      run: |
        mkdir "package/android" -ErrorAction SilentlyContinue
        $outFile = "package/android/android-x86.iso"
        
        # Use Android-x86 6.0 (~450MB instead of 921MB for 9.0)
        $url = "https://downloads.sourceforge.net/project/android-x86/Release%206.0/android-x86_64-6.0-r3.iso"
        $minSize = 400  # MB - expected ~450MB
        
        # Download with resume support - retry up to 10 times
        $maxRetries = 10
        for ($i = 1; $i -le $maxRetries; $i++) {
          Write-Host "Download attempt $i/$maxRetries..."
          
          # -C - means resume from where it left off
          curl -L -C - --retry 3 --connect-timeout 30 --max-time 300 -o $outFile $url 2>&1
          
          if (Test-Path $outFile) {
            $size = (Get-Item $outFile).Length / 1MB
            Write-Host "Current size: $([math]::Round($size, 1)) MB"
            
            if ($size -gt $minSize) {
              Write-Host "Download complete!"
              break
            }
          }
          
          if ($i -eq $maxRetries) {
            # If 6.0 fails completely, try 9.0 with resume
            Write-Host "Trying Android-x86 9.0 as fallback..."
            $url = "https://downloads.sourceforge.net/project/android-x86/Release%209.0/android-x86_64-9.0-r2.iso"
            $minSize = 800
            $maxRetries = 20  # More retries for larger file
          }
          
          Write-Host "Resuming in 5 seconds..."
          Start-Sleep -Seconds 5
        }
        
        # Final check
        if (Test-Path $outFile) {
          $finalSize = (Get-Item $outFile).Length / 1MB
          Write-Host "Final ISO size: $([math]::Round($finalSize, 1)) MB"
          if ($finalSize -lt 100) {
            Write-Host "ERROR: File too small"
            exit 1
          }
        } else {
          Write-Host "ERROR: No file downloaded"
          exit 1
        }

    - name: Assemble and Compress
      run: |
        Copy-Item "dist/MAWAQIT-Player.exe" "package/MAWAQIT-Player.exe"
        mkdir "package/data" -ErrorAction SilentlyContinue
        
        Write-Host "=== Sizes ==="
        @("qemu","platform-tools","android") | ForEach-Object {
          $s = (Get-ChildItem "package/$_" -Recurse -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "${_}: $([math]::Round($s, 1)) MB"
        }
        
        7z a -t7z -mx=9 -mfb=64 "MAWAQIT-Player.7z" "./package/*"
        $s = (Get-Item "MAWAQIT-Player.7z").Length / 1MB
        Write-Host "Final 7z: $([math]::Round($s, 1)) MB"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MAWAQIT-Player
        path: MAWAQIT-Player.7z
        retention-days: 30

    - name: Delete old release
      run: gh release delete v3.5.0 --yes --cleanup-tag 2>$null
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v3.5.0
        name: "MAWAQIT Player v3.5.0"
        body: |
          ## 🕌 MAWAQIT Player
          1. حمّل `MAWAQIT-Player.7z`
          2. فك الضغط بـ 7-Zip
          3. شغّل `MAWAQIT-Player.exe`
          4. اختر XAPK واضغط 🚀 تشغيل
        files: MAWAQIT-Player.7z
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
