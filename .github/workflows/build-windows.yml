name: Build MAWAQIT XAPK Player

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install pyinstaller Pillow

    - name: Create App Icon
      run: |
        python -c "
        from PIL import Image, ImageDraw
        import math
        size = 256
        img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
        draw = ImageDraw.Draw(img)
        cx, cy = size // 2, size // 2
        draw.ellipse([10, 10, size-10, size-10], outline='#5B2D8E', width=8)
        for i in range(12):
            angle = math.radians(i * 30 - 90)
            x = cx + 100 * math.cos(angle)
            y = cy + 100 * math.sin(angle)
            dot_r = 6 if i % 3 == 0 else 4
            draw.ellipse([x-dot_r, y-dot_r, x+dot_r, y+dot_r], fill='#5B2D8E')
        draw.line([(cx, cy), (cx, cy-55)], fill='#5B2D8E', width=6)
        draw.line([(cx, cy), (cx+40, cy+30)], fill='#5B2D8E', width=5)
        draw.ellipse([cx-8, cy-8, cx+8, cy+8], fill='#5B2D8E')
        img.save('app.ico', format='ICO', sizes=[(256,256),(64,64),(32,32),(16,16)])
        "

    - name: Build XAPK Player EXE
      run: pyinstaller --onefile --windowed --name "MAWAQIT-Player" --icon=app.ico xapk_player.py

    - name: Download ADB
      run: |
        curl -L -o pt.zip "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
        Expand-Archive pt.zip -DestinationPath "package" -Force
        Remove-Item pt.zip
        Get-ChildItem "package/platform-tools" -Exclude "adb.exe","AdbWinApi.dll","AdbWinUsbApi.dll" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

    - name: Download and Trim QEMU
      run: |
        curl -L -o qemu.zip "https://github.com/dirkarnez/qemu-portable/releases/download/20240822/qemu-w64-portable-20240822.zip"
        Expand-Archive qemu.zip -DestinationPath "temp_qemu" -Force
        Remove-Item qemu.zip
        $qemuExe = Get-ChildItem "temp_qemu" -Recurse -Filter "qemu-system-x86_64.exe" | Select-Object -First 1
        $srcDir = $qemuExe.DirectoryName
        mkdir "package/qemu" -ErrorAction SilentlyContinue
        Copy-Item "$srcDir/qemu-system-x86_64.exe" "package/qemu/"
        Copy-Item "$srcDir/qemu-img.exe" "package/qemu/" -ErrorAction SilentlyContinue
        Get-ChildItem "$srcDir" -Filter "*.dll" | Copy-Item -Destination "package/qemu/"
        mkdir "package/qemu/share" -ErrorAction SilentlyContinue
        @("bios-256k.bin","efi-virtio.rom","kvmvapic.bin","vgabios-virtio.bin","vgabios-stdvga.bin","efi-e1000.rom") | ForEach-Object {
          $f = Get-ChildItem "temp_qemu" -Recurse -Filter $_ | Select-Object -First 1
          if ($f) { Copy-Item $f.FullName "package/qemu/share/" }
        }
        Remove-Item "temp_qemu" -Recurse -Force

    - name: Install aria2c
      run: choco install aria2 -y --no-progress

    - name: Download smallest Android-x86
      timeout-minutes: 25
      run: |
        mkdir "package/android" -ErrorAction SilentlyContinue
        $outFile = "package/android/android-x86.iso"
        
        # Try from smallest to largest - use first that works
        $versions = @(
          @{url="https://downloads.sourceforge.net/project/android-x86/Release%204.4/android-x86-4.4-r5.iso"; min=250; name="4.4 (~350MB)"},
          @{url="https://downloads.sourceforge.net/project/android-x86/Release%207.1/android-x86_64-7.1-r5.iso"; min=500; name="7.1 (~700MB)"},
          @{url="https://downloads.sourceforge.net/project/android-x86/Release%208.1/android-x86_64-8.1-r6.iso"; min=600; name="8.1 (~800MB)"},
          @{url="https://downloads.sourceforge.net/project/android-x86/Release%209.0/android-x86_64-9.0-r2.iso"; min=800; name="9.0 (~920MB)"}
        )
        
        $success = $false
        foreach ($ver in $versions) {
          Write-Host "`n=== Trying Android-x86 $($ver.name) ==="
          Remove-Item $outFile -ErrorAction SilentlyContinue
          
          aria2c --max-connection-per-server=16 --split=16 --min-split-size=1M --max-tries=5 --retry-wait=3 --timeout=120 --connect-timeout=30 --file-allocation=none --console-log-level=notice -d "package/android" -o "android-x86.iso" $ver.url 2>&1
          
          if (Test-Path $outFile) {
            $size = (Get-Item $outFile).Length / 1MB
            Write-Host "Size: $([math]::Round($size, 1)) MB (need > $($ver.min) MB)"
            if ($size -gt $ver.min) {
              Write-Host "SUCCESS with Android $($ver.name)!"
              $success = $true
              break
            } else {
              Write-Host "File too small, skipping..."
            }
          } else {
            Write-Host "No file produced, skipping..."
          }
        }
        
        if (-not $success) {
          Write-Host "ERROR: Could not download any Android-x86 version"
          exit 1
        }

    - name: Extract essential files from ISO
      run: |
        $iso = "package/android/android-x86.iso"
        $dest = "package/android"
        
        # Extract only boot files from ISO (skip ISO overhead)
        Write-Host "Extracting essential files from ISO..."
        7z e $iso -o"$dest" kernel initrd.img ramdisk.img system.sfs system.img install.img -r -y 2>&1
        
        # Check what we got
        Get-ChildItem $dest | ForEach-Object {
          Write-Host "$($_.Name): $([math]::Round($_.Length / 1MB, 1)) MB"
        }
        
        # If extraction worked, remove ISO to save space
        if ((Test-Path "$dest/kernel") -or (Test-Path "$dest/system.sfs") -or (Test-Path "$dest/system.img")) {
          Remove-Item $iso -Force
          Write-Host "ISO removed, using extracted files"
        } else {
          Write-Host "Keeping full ISO (extraction didn't find expected files)"
        }

    - name: Assemble and Compress
      run: |
        Copy-Item "dist/MAWAQIT-Player.exe" "package/MAWAQIT-Player.exe"
        mkdir "package/data" -ErrorAction SilentlyContinue
        
        $total = (Get-ChildItem "package" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
        Write-Host "Total uncompressed: $([math]::Round($total, 1)) MB"
        
        # Maximum 7z compression
        7z a -t7z -mx=9 -mfb=273 -ms=on -md=64m "MAWAQIT-Player.7z" "./package/*"
        $s = (Get-Item "MAWAQIT-Player.7z").Length / 1MB
        Write-Host "Final 7z: $([math]::Round($s, 1)) MB"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MAWAQIT-Player
        path: MAWAQIT-Player.7z
        retention-days: 30

    - name: Delete old release
      run: gh release delete v3.5.0 --yes --cleanup-tag 2>$null
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v3.5.0
        name: "MAWAQIT Player v3.5.0"
        body: |
          ## 🕌 MAWAQIT Player
          1. حمّل `MAWAQIT-Player.7z`
          2. فك الضغط بـ 7-Zip
          3. شغّل `MAWAQIT-Player.exe`
          4. اختر XAPK واضغط 🚀 تشغيل
        files: MAWAQIT-Player.7z
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
