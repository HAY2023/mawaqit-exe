name: Build XAPK Player (Full Package)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile --windowed --name "XAPK-Player" xapk_player.py

    - name: Download ADB Platform-Tools
      run: |
        Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile "platform-tools.zip"
        Expand-Archive -Path "platform-tools.zip" -DestinationPath "package" -Force
        Remove-Item "platform-tools.zip"

    - name: Download QEMU
      run: |
        # Download portable QEMU for Windows (from dirkarnez/qemu-portable)
        Invoke-WebRequest -Uri "https://github.com/dirkarnez/qemu-portable/releases/download/20240822/qemu-w64-portable-20240822.zip" -OutFile "qemu.zip"
        Expand-Archive -Path "qemu.zip" -DestinationPath "package/qemu" -Force
        Remove-Item "qemu.zip" -ErrorAction SilentlyContinue
        # Verify
        if (Test-Path "package/qemu/qemu-system-x86_64.exe") {
          Write-Host "QEMU OK"
        } else {
          # Files might be in a subfolder
          $sub = Get-ChildItem -Path "package/qemu" -Directory | Select-Object -First 1
          if ($sub) {
            Get-ChildItem -Path $sub.FullName | Move-Item -Destination "package/qemu/" -Force
            Remove-Item $sub.FullName -Recurse -ErrorAction SilentlyContinue
          }
          Write-Host "Files moved to package/qemu/"
        }

    - name: Download Android-x86 ISO
      run: |
        mkdir "package/android" -ErrorAction SilentlyContinue
        # Download Android-x86 9.0 r2 (stable, ~900MB)
        Invoke-WebRequest -Uri "https://sourceforge.net/projects/android-x86/files/Release%209.0/android-x86_64-9.0-r2.iso/download" -OutFile "package/android/android-x86.iso" -UserAgent "Mozilla/5.0"

    - name: Assemble Package
      run: |
        # Copy EXE to package root
        Copy-Item "dist/XAPK-Player.exe" -Destination "package/XAPK-Player.exe"
        
        # Create data folder
        mkdir "package/data" -ErrorAction SilentlyContinue
        
        # Create README
        @"
        ===================================
        XAPK Player - مشغل تطبيقات أندرويد
        ===================================
        
        الاستخدام:
        1. شغّل XAPK-Player.exe
        2. اختر ملف XAPK أو APK
        3. اضغط تشغيل
        
        لا يحتاج تثبيت أي شيء إضافي!
        "@ | Out-File -FilePath "package/README.txt" -Encoding UTF8

    - name: Create ZIP Package
      run: |
        Compress-Archive -Path "package/*" -DestinationPath "XAPK-Player-Full.zip" -Force

    - name: Upload Package as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XAPK-Player-Full
        path: XAPK-Player-Full.zip
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v2.0.0
        name: "XAPK Player v2.0.0 - حزمة كاملة"
        body: |
          ## XAPK Player - مشغل تطبيقات أندرويد 📱
          
          حزمة كاملة تحتوي على كل شيء - لا يحتاج تثبيت أي شيء!
          
          ### المحتويات:
          - ✅ XAPK Player (واجهة التشغيل)
          - ✅ QEMU (محاكي مدمج)
          - ✅ Android-x86 (نظام أندرويد)
          - ✅ ADB (أدوات الاتصال)
          
          ### الاستخدام:
          1. حمّل `XAPK-Player-Full.zip`
          2. فك الضغط
          3. شغّل `XAPK-Player.exe`
          4. اختر ملف XAPK واضغط تشغيل
        files: XAPK-Player-Full.zip
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
