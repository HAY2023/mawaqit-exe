name: Build MAWAQIT XAPK Player

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install pyinstaller Pillow

    - name: Create App Icon
      run: |
        python -c "
        from PIL import Image, ImageDraw
        import math
        size = 256
        img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
        draw = ImageDraw.Draw(img)
        cx, cy = size // 2, size // 2
        draw.ellipse([10, 10, size-10, size-10], outline='#5B2D8E', width=8)
        for i in range(12):
            angle = math.radians(i * 30 - 90)
            x = cx + 100 * math.cos(angle)
            y = cy + 100 * math.sin(angle)
            dot_r = 6 if i % 3 == 0 else 4
            draw.ellipse([x-dot_r, y-dot_r, x+dot_r, y+dot_r], fill='#5B2D8E')
        draw.line([(cx, cy), (cx, cy-55)], fill='#5B2D8E', width=6)
        draw.line([(cx, cy), (cx+40, cy+30)], fill='#5B2D8E', width=5)
        draw.ellipse([cx-8, cy-8, cx+8, cy+8], fill='#5B2D8E')
        img.save('app.ico', format='ICO', sizes=[(256,256),(64,64),(32,32),(16,16)])
        print('Icon OK')
        "

    - name: Build XAPK Player EXE
      run: pyinstaller --onefile --windowed --name "MAWAQIT-Player" --icon=app.ico xapk_player.py

    - name: Download ADB (minimal)
      run: |
        curl -L -o platform-tools.zip "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
        Expand-Archive -Path "platform-tools.zip" -DestinationPath "package" -Force
        Remove-Item "platform-tools.zip"
        # Keep only essential ADB files
        Get-ChildItem "package/platform-tools" -Exclude "adb.exe","AdbWinApi.dll","AdbWinUsbApi.dll" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
        Write-Host "ADB OK - Size: $([math]::Round((Get-ChildItem 'package/platform-tools' -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 1)) MB"

    - name: Download and Trim QEMU
      run: |
        curl -L -o qemu.zip "https://github.com/dirkarnez/qemu-portable/releases/download/20240822/qemu-w64-portable-20240822.zip"
        Expand-Archive -Path "qemu.zip" -DestinationPath "temp_qemu" -Force
        Remove-Item "qemu.zip"
        
        # Find QEMU files
        $qemuDir = Get-ChildItem "temp_qemu" -Recurse -Filter "qemu-system-x86_64.exe" | Select-Object -First 1
        $srcDir = $qemuDir.DirectoryName
        
        # Create minimal QEMU (only x86_64 essentials)
        mkdir "package/qemu" -ErrorAction SilentlyContinue
        
        # Copy only what we need
        Copy-Item "$srcDir/qemu-system-x86_64.exe" "package/qemu/"
        Copy-Item "$srcDir/qemu-img.exe" "package/qemu/" -ErrorAction SilentlyContinue
        
        # Copy required DLLs
        Get-ChildItem "$srcDir" -Filter "*.dll" | Copy-Item -Destination "package/qemu/"
        
        # Copy only essential BIOS/firmware
        $biosFiles = @("bios-256k.bin", "efi-virtio.rom", "kvmvapic.bin", "vgabios-virtio.bin", "vgabios-stdvga.bin", "efi-e1000.rom", "efi-e1000e.rom")
        mkdir "package/qemu/share" -ErrorAction SilentlyContinue
        foreach ($f in $biosFiles) {
          $found = Get-ChildItem "temp_qemu" -Recurse -Filter $f | Select-Object -First 1
          if ($found) { Copy-Item $found.FullName "package/qemu/share/" }
        }
        
        Remove-Item "temp_qemu" -Recurse -Force
        Write-Host "QEMU OK - Size: $([math]::Round((Get-ChildItem 'package/qemu' -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 1)) MB"

    - name: Download Android-x86 (compact version)
      run: |
        mkdir "package/android" -ErrorAction SilentlyContinue
        
        # Use Android-x86 6.0 (much smaller than 9.0: ~450MB vs ~900MB)
        $mirrors = @(
          "https://cfhcable.dl.sourceforge.net/project/android-x86/Release%206.0/android-x86_64-6.0-r3.iso",
          "https://netcologne.dl.sourceforge.net/project/android-x86/Release%206.0/android-x86_64-6.0-r3.iso",
          "https://deac-fra.dl.sourceforge.net/project/android-x86/Release%206.0/android-x86_64-6.0-r3.iso",
          "https://kent.dl.sourceforge.net/project/android-x86/Release%206.0/android-x86_64-6.0-r3.iso"
        )
        
        $success = $false
        foreach ($url in $mirrors) {
          Write-Host "Trying: $url"
          curl -L --retry 2 --connect-timeout 30 --max-time 600 -o "package/android/android-x86.iso" $url
          
          if (Test-Path "package/android/android-x86.iso") {
            $isoSize = (Get-Item "package/android/android-x86.iso").Length / 1MB
            Write-Host "Downloaded: $([math]::Round($isoSize, 1)) MB"
            if ($isoSize -gt 100) {
              $success = $true
              break
            }
            Remove-Item "package/android/android-x86.iso" -ErrorAction SilentlyContinue
          }
          Write-Host "Failed, next mirror..."
        }
        
        if (-not $success) {
          Write-Host "ERROR: Could not download Android-x86"
          exit 1
        }

    - name: Assemble Package
      run: |
        Copy-Item "dist/MAWAQIT-Player.exe" "package/MAWAQIT-Player.exe"
        Copy-Item "app.ico" "package/app.ico"
        mkdir "package/data" -ErrorAction SilentlyContinue
        
        $totalSize = (Get-ChildItem "package" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
        Write-Host "Total uncompressed: $([math]::Round($totalSize, 1)) MB"

    - name: Create compressed package
      run: |
        # Use 7z for much better compression
        7z a -t7z -mx=9 "MAWAQIT-Player.7z" "./package/*"
        $pkg = (Get-Item "MAWAQIT-Player.7z").Length / 1MB
        Write-Host "Final 7z size: $([math]::Round($pkg, 1)) MB"
        
        # Also create ZIP as fallback
        Compress-Archive -Path "package/*" -DestinationPath "MAWAQIT-Player.zip" -Force
        $zipSize = (Get-Item "MAWAQIT-Player.zip").Length / 1MB
        Write-Host "Final ZIP size: $([math]::Round($zipSize, 1)) MB"

    - name: Upload as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MAWAQIT-Player
        path: |
          MAWAQIT-Player.7z
          MAWAQIT-Player.zip
        retention-days: 30

    - name: Delete old release
      run: gh release delete v3.5.0 --yes --cleanup-tag 2>$null
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v3.5.0
        name: "MAWAQIT Player v3.5.0"
        body: |
          ## 🕌 MAWAQIT Player for Windows
          
          حزمة كاملة مدمجة - حجم أصغر!
          
          ### التحميل:
          - **MAWAQIT-Player.7z** ← حجم أصغر (يحتاج 7-Zip لفك الضغط)
          - **MAWAQIT-Player.zip** ← يعمل مباشرة مع Windows
          
          ### الاستخدام:
          1. فك الضغط
          2. شغّل `MAWAQIT-Player.exe`
          3. اختر ملف XAPK واضغط 🚀 تشغيل
        files: |
          MAWAQIT-Player.7z
          MAWAQIT-Player.zip
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
