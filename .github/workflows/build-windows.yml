name: Build MAWAQIT XAPK Player

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install pyinstaller Pillow

    - name: Create App Icon
      run: |
        python -c "
        from PIL import Image, ImageDraw
        import math
        size = 256
        img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
        draw = ImageDraw.Draw(img)
        cx, cy = size // 2, size // 2
        draw.ellipse([10, 10, size-10, size-10], outline='#5B2D8E', width=8)
        for i in range(12):
            angle = math.radians(i * 30 - 90)
            x = cx + 100 * math.cos(angle)
            y = cy + 100 * math.sin(angle)
            dot_r = 6 if i % 3 == 0 else 4
            draw.ellipse([x-dot_r, y-dot_r, x+dot_r, y+dot_r], fill='#5B2D8E')
        draw.line([(cx, cy), (cx, cy-55)], fill='#5B2D8E', width=6)
        draw.line([(cx, cy), (cx+40, cy+30)], fill='#5B2D8E', width=5)
        draw.ellipse([cx-8, cy-8, cx+8, cy+8], fill='#5B2D8E')
        img.save('app.ico', format='ICO', sizes=[(256,256),(64,64),(32,32),(16,16)])
        "

    - name: Build XAPK Player EXE
      run: pyinstaller --onefile --windowed --name "MAWAQIT-Player" --icon=app.ico xapk_player.py

    - name: Download ADB (minimal - only 3 files)
      run: |
        curl -L -o pt.zip "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
        Expand-Archive pt.zip -DestinationPath "package" -Force
        Remove-Item pt.zip
        Get-ChildItem "package/platform-tools" -Exclude "adb.exe","AdbWinApi.dll","AdbWinUsbApi.dll" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
        $s = (Get-ChildItem "package/platform-tools" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
        Write-Host "ADB: $([math]::Round($s, 1)) MB"

    - name: Download and Trim QEMU (essential only)
      run: |
        curl -L -o qemu.zip "https://github.com/dirkarnez/qemu-portable/releases/download/20240822/qemu-w64-portable-20240822.zip"
        Expand-Archive qemu.zip -DestinationPath "temp_qemu" -Force
        Remove-Item qemu.zip
        $qemuExe = Get-ChildItem "temp_qemu" -Recurse -Filter "qemu-system-x86_64.exe" | Select-Object -First 1
        $srcDir = $qemuExe.DirectoryName
        mkdir "package/qemu" -ErrorAction SilentlyContinue
        
        # Only essential exe
        Copy-Item "$srcDir/qemu-system-x86_64.exe" "package/qemu/"
        Copy-Item "$srcDir/qemu-img.exe" "package/qemu/" -ErrorAction SilentlyContinue
        
        # Only required DLLs (skip debug/test DLLs)
        Get-ChildItem "$srcDir" -Filter "*.dll" | Copy-Item -Destination "package/qemu/"
        
        # Only essential BIOS files
        mkdir "package/qemu/share" -ErrorAction SilentlyContinue
        @("bios-256k.bin","efi-virtio.rom","kvmvapic.bin","vgabios-stdvga.bin","efi-e1000.rom") | ForEach-Object {
          $f = Get-ChildItem "temp_qemu" -Recurse -Filter $_ | Select-Object -First 1
          if ($f) { Copy-Item $f.FullName "package/qemu/share/" }
        }
        Remove-Item "temp_qemu" -Recurse -Force
        $s = (Get-ChildItem "package/qemu" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
        Write-Host "QEMU: $([math]::Round($s, 1)) MB"

    - name: Install aria2c
      run: choco install aria2 -y --no-progress

    - name: Download Android-x86 (smallest version)
      timeout-minutes: 25
      run: |
        mkdir "package/android" -ErrorAction SilentlyContinue
        
        # Try smallest versions first
        $versions = @(
          @{url="https://downloads.sourceforge.net/project/android-x86/Release%204.4/android-x86-4.4-r5.iso"; min=250; name="4.4"},
          @{url="https://downloads.sourceforge.net/project/android-x86/Release%207.1/android-x86_64-7.1-r5.iso"; min=500; name="7.1"},
          @{url="https://downloads.sourceforge.net/project/android-x86/Release%209.0/android-x86_64-9.0-r2.iso"; min=800; name="9.0"}
        )
        
        $success = $false
        foreach ($ver in $versions) {
          Write-Host "`n=== Trying Android $($ver.name) ==="
          Remove-Item "package/android/android-x86.iso" -ErrorAction SilentlyContinue
          
          aria2c --max-connection-per-server=16 --split=16 --min-split-size=1M --max-tries=5 --retry-wait=3 --timeout=120 --connect-timeout=30 --file-allocation=none -d "package/android" -o "android-x86.iso" $ver.url 2>&1
          
          if (Test-Path "package/android/android-x86.iso") {
            $size = (Get-Item "package/android/android-x86.iso").Length / 1MB
            Write-Host "Got: $([math]::Round($size, 1)) MB (need > $($ver.min))"
            if ($size -gt $ver.min) {
              Write-Host "OK!"
              $success = $true
              break
            }
          }
        }
        if (-not $success) { exit 1 }

    - name: Extract essential files from ISO (reduce size)
      run: |
        $iso = "package/android/android-x86.iso"
        $dest = "package/android"
        
        Write-Host "Extracting boot files from ISO..."
        7z e $iso -o"$dest" kernel initrd.img ramdisk.img system.sfs system.img -r -y 2>&1
        
        Get-ChildItem $dest | ForEach-Object {
          Write-Host "$($_.Name): $([math]::Round($_.Length / 1MB, 1)) MB"
        }
        
        # Remove ISO if we got the essential files
        $hasKernel = Test-Path "$dest/kernel"
        $hasSystem = (Test-Path "$dest/system.sfs") -or (Test-Path "$dest/system.img")
        if ($hasKernel -and $hasSystem) {
          Remove-Item $iso -Force
          Write-Host "Removed ISO, using extracted files (saved space!)"
        } else {
          Write-Host "Keeping ISO (extraction incomplete)"
        }
        
        $s = (Get-ChildItem $dest -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
        Write-Host "Android total: $([math]::Round($s, 1)) MB"

    - name: Assemble and Ultra-Compress
      run: |
        Copy-Item "dist/MAWAQIT-Player.exe" "package/MAWAQIT-Player.exe"
        mkdir "package/data" -ErrorAction SilentlyContinue
        
        Write-Host "=== Package Contents ==="
        Get-ChildItem "package" -Directory | ForEach-Object {
          $s = (Get-ChildItem $_.FullName -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "$($_.Name): $([math]::Round($s, 1)) MB"
        }
        $total = (Get-ChildItem "package" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
        Write-Host "TOTAL uncompressed: $([math]::Round($total, 1)) MB"
        
        # Ultra compression: LZMA2 with max settings
        Write-Host "`nCompressing with maximum settings..."
        7z a -t7z -m0=lzma2 -mx=9 -mfb=273 -md=64m -ms=on "MAWAQIT-Player.7z" "./package/*"
        $s = (Get-Item "MAWAQIT-Player.7z").Length / 1MB
        Write-Host "FINAL 7z: $([math]::Round($s, 1)) MB"
        Write-Host "Compression ratio: $([math]::Round($s / $total * 100, 1))%"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MAWAQIT-Player
        path: MAWAQIT-Player.7z
        retention-days: 30

    - name: Delete old release
      run: gh release delete v3.5.0 --yes --cleanup-tag 2>$null
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v3.5.0
        name: "MAWAQIT Player v3.5.0"
        body: |
          ## 🕌 MAWAQIT Player - كل شيء مدمج
          
          1. حمّل `MAWAQIT-Player.7z`
          2. فك الضغط بـ 7-Zip
          3. شغّل `MAWAQIT-Player.exe`
          4. اختر XAPK واضغط 🚀 تشغيل
        files: MAWAQIT-Player.7z
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
