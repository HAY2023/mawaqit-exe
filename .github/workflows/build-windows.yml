name: Build XAPK Player

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build XAPK Player EXE
      run: |
        pyinstaller --onefile --windowed --name "XAPK-Player" xapk_player.py

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XAPK-Player-Windows
        path: dist/XAPK-Player.exe

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        name: "XAPK Player v1.0.0"
        body: |
          ## XAPK Player - مشغل XAPK خفيف 📱
          
          مشغل تطبيقات XAPK خفيف لنظام ويندوز.
          
          ### كيفية الاستخدام:
          1. حمّل `XAPK-Player.exe`
          2. شغّل البرنامج واختر ملف XAPK
          3. اضغط "تثبيت وتشغيل"
          
          ### المتطلبات:
          - Windows Subsystem for Android (WSA) أو محاكي أندرويد
        files: dist/XAPK-Player.exe
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
