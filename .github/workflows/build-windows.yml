name: Build MAWAQIT TV for Windows

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview

    - name: Build MAWAQIT EXE
      run: |
        pyinstaller --onefile --windowed --name MAWAQIT mawaqit.py

    - name: Verify Build
      run: |
        if (Test-Path "dist/MAWAQIT.exe") {
          $size = (Get-Item "dist/MAWAQIT.exe").Length / 1MB
          Write-Host "Build successful! MAWAQIT.exe size: $([math]::Round($size, 1)) MB"
        } else {
          Write-Host "Build FAILED!"
          exit 1
        }

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MAWAQIT-Windows
        path: dist/MAWAQIT.exe
        retention-days: 90

    - name: Delete old release if exists
      run: |
        gh release delete v3.5.0 --yes --cleanup-tag 2>$null
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v3.5.0
        name: "MAWAQIT TV v3.5.0 for Windows"
        body: |
          ## 🕌 MAWAQIT TV for Windows
          
          تطبيق مواقيت TV لأجهزة Windows - ملف واحد جاهز للتشغيل!
          
          ### التحميل والتشغيل:
          1. حمّل ملف `MAWAQIT.exe` من الأسفل
          2. شغّل الملف مباشرة (لا يحتاج تثبيت!)
          3. أدخل اسم المسجد أو رابط mawaqit.net
          4. اضغط **Start TV App**
          
          ### المميزات:
          - ✅ ملف واحد - كل شيء مدمج بالداخل
          - ✅ لا يحتاج تثبيت Python أو أي برنامج آخر  
          - ✅ واجهة مميزة وعصرية
          - ✅ وضع ملء الشاشة
          - ✅ يعمل مباشرة بدون إعدادات
        files: dist/MAWAQIT.exe
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
