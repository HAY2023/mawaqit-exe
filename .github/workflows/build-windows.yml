name: Build MAWAQIT Player (Lite EXE)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install pyinstaller Pillow

    - name: Create App Icon
      run: |
        python -c "
        from PIL import Image, ImageDraw
        import math
        size = 256
        img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
        draw = ImageDraw.Draw(img)
        cx, cy = size // 2, size // 2
        draw.ellipse([10, 10, size-10, size-10], outline='#5B2D8E', width=8)
        for i in range(12):
            angle = math.radians(i * 30 - 90)
            x = cx + 100 * math.cos(angle)
            y = cy + 100 * math.sin(angle)
            dot_r = 6 if i % 3 == 0 else 4
            draw.ellipse([x-dot_r, y-dot_r, x+dot_r, y+dot_r], fill='#5B2D8E')
        draw.line([(cx, cy), (cx, cy-55)], fill='#5B2D8E', width=6)
        draw.line([(cx, cy), (cx+40, cy+30)], fill='#5B2D8E', width=5)
        draw.ellipse([cx-8, cy-8, cx+8, cy+8], fill='#5B2D8E')
        img.save('app.ico', format='ICO', sizes=[(256,256),(64,64),(32,32),(16,16)])
        "

    - name: Build Lite EXE
      run: pyinstaller --onefile --windowed --name "MAWAQIT-Player" --icon=app.ico xapk_player.py

    - name: Package
      run: |
        mkdir "release" -ErrorAction SilentlyContinue
        Copy-Item "dist/MAWAQIT-Player.exe" "release/MAWAQIT-Player.exe"
        
        $size = (Get-Item "release/MAWAQIT-Player.exe").Length / 1MB
        Write-Host "EXE Size: $([math]::Round($size, 1)) MB"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MAWAQIT-Player
        path: release/MAWAQIT-Player.exe
        retention-days: 30

    - name: Delete old release
      continue-on-error: true
      run: |
        gh release delete v4.0.0 --yes --cleanup-tag 2>$null
        exit 0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v4.0.0
        name: "MAWAQIT Player v4.0.0 - Lite Edition"
        body: |
          ## 🕌 MAWAQIT Player v4.0 - النسخة الخفيفة
          
          ✅ **حجم صغير جداً:** ~10 MB فقط!
          ✅ **يعمل فوراً بالإنترنت**
          ✅ **أوفلاين اختياري:** حمّل الملفات من داخل التطبيق
          
          ### الاستخدام:
          1. حمّل `MAWAQIT-Player.exe`
          2. شغّله → يعمل فوراً بالإنترنت
          3. لتشغيله بدون إنترنت → اضغط "📥 تحميل ملفات الأوفلاين" داخل التطبيق
        files: release/MAWAQIT-Player.exe
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
