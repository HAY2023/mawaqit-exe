name: Build and Release MAWAQIT

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview

    - name: Build MAWAQIT EXE
      run: |
        pyinstaller --onefile --windowed --name MAWAQIT --icon=NONE mawaqit.py

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MAWAQIT-Windows
        path: dist/MAWAQIT.exe

    - name: Create Release and Upload EXE
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v3.5.0
        name: "MAWAQIT TV v3.5.0"
        body: |
          ## MAWAQIT TV for Windows 🕌
          
          تطبيق مواقيت TV لأجهزة Windows.
          
          ### التحميل والتشغيل:
          1. حمّل ملف `MAWAQIT.exe` من الأسفل
          2. شغّل الملف مباشرة (لا يحتاج تثبيت)
          3. أدخل اسم المسجد أو الرابط واضغط Start
        files: dist/MAWAQIT.exe
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
