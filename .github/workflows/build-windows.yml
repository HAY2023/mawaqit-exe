name: Build MAWAQIT XAPK Player

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install pyinstaller Pillow

    - name: Create App Icon
      run: |
        python -c "
        from PIL import Image, ImageDraw
        import math
        size = 256
        img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
        draw = ImageDraw.Draw(img)
        cx, cy = size // 2, size // 2
        draw.ellipse([10, 10, size-10, size-10], outline='#5B2D8E', width=8)
        for i in range(12):
            angle = math.radians(i * 30 - 90)
            r = 100
            x = cx + r * math.cos(angle)
            y = cy + r * math.sin(angle)
            dot_r = 6 if i % 3 == 0 else 4
            draw.ellipse([x-dot_r, y-dot_r, x+dot_r, y+dot_r], fill='#5B2D8E')
        draw.line([(cx, cy), (cx, cy-55)], fill='#5B2D8E', width=6)
        draw.line([(cx, cy), (cx+40, cy+30)], fill='#5B2D8E', width=5)
        draw.ellipse([cx-8, cy-8, cx+8, cy+8], fill='#5B2D8E')
        img.save('app.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
        print('Icon OK')
        "

    - name: Build XAPK Player EXE
      run: pyinstaller --onefile --windowed --name "MAWAQIT-Player" --icon=app.ico xapk_player.py

    - name: Download ADB
      run: |
        curl -L -o platform-tools.zip "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
        Expand-Archive -Path "platform-tools.zip" -DestinationPath "package" -Force
        Remove-Item "platform-tools.zip"
        Write-Host "ADB OK"

    - name: Download QEMU Portable
      run: |
        curl -L -o qemu.zip "https://github.com/dirkarnez/qemu-portable/releases/download/20240822/qemu-w64-portable-20240822.zip"
        Expand-Archive -Path "qemu.zip" -DestinationPath "package/qemu" -Force
        Remove-Item "qemu.zip" -ErrorAction SilentlyContinue
        $sub = Get-ChildItem -Path "package/qemu" -Directory | Select-Object -First 1
        if ($sub -and !(Test-Path "package/qemu/qemu-system-x86_64.exe")) {
          Get-ChildItem -Path $sub.FullName | Move-Item -Destination "package/qemu/" -Force
          Remove-Item $sub.FullName -Recurse -ErrorAction SilentlyContinue
        }
        Write-Host "QEMU OK"

    - name: Download Android-x86 ISO
      run: |
        mkdir "package/android" -ErrorAction SilentlyContinue
        
        # Try SourceForge direct mirrors (bypass Cloudflare)
        $mirrors = @(
          "https://cfhcable.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86_64-9.0-r2.iso",
          "https://netcologne.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86_64-9.0-r2.iso",
          "https://deac-fra.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86_64-9.0-r2.iso",
          "https://kent.dl.sourceforge.net/project/android-x86/Release%209.0/android-x86_64-9.0-r2.iso",
          "https://downloads.sourceforge.net/project/android-x86/Release%209.0/android-x86_64-9.0-r2.iso"
        )
        
        $success = $false
        foreach ($url in $mirrors) {
          Write-Host "Trying: $url"
          curl -L --retry 2 --connect-timeout 30 --max-time 600 -o "package/android/android-x86.iso" $url
          
          if (Test-Path "package/android/android-x86.iso") {
            $isoSize = (Get-Item "package/android/android-x86.iso").Length / 1MB
            Write-Host "Downloaded: $([math]::Round($isoSize, 1)) MB"
            if ($isoSize -gt 100) {
              $success = $true
              Write-Host "Android-x86 ISO OK!"
              break
            }
            Remove-Item "package/android/android-x86.iso" -ErrorAction SilentlyContinue
          }
          Write-Host "Failed, trying next mirror..."
        }
        
        if (-not $success) {
          Write-Host "ERROR: Could not download Android-x86 from any mirror"
          exit 1
        }

    - name: Assemble Package
      run: |
        Copy-Item "dist/MAWAQIT-Player.exe" -Destination "package/MAWAQIT-Player.exe"
        Copy-Item "app.ico" -Destination "package/app.ico"
        mkdir "package/data" -ErrorAction SilentlyContinue

        @"
        ===================================
        MAWAQIT Player
        ===================================
        
        1. Run MAWAQIT-Player.exe
        2. Select your XAPK/APK file
        3. Click Start
        
        No installation needed!
        "@ | Out-File -FilePath "package/README.txt" -Encoding UTF8

    - name: Create ZIP
      run: |
        Compress-Archive -Path "package/*" -DestinationPath "MAWAQIT-Player.zip" -Force
        $zipSize = (Get-Item "MAWAQIT-Player.zip").Length / 1MB
        Write-Host "Package size: $([math]::Round($zipSize, 1)) MB"

    - name: Upload as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MAWAQIT-Player
        path: MAWAQIT-Player.zip
        retention-days: 30

    - name: Delete old release
      run: gh release delete v3.5.0 --yes --cleanup-tag 2>$null
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v3.5.0
        name: "MAWAQIT Player v3.5.0"
        body: |
          ## 🕌 MAWAQIT Player for Windows
          
          حزمة كاملة - كل شيء مدمج بالداخل!
          
          ### المحتويات:
          - ✅ MAWAQIT Player + أيقونة
          - ✅ QEMU (محاكي أندرويد)
          - ✅ Android-x86 (نظام أندرويد)
          - ✅ ADB (أدوات التثبيت)
          
          ### الاستخدام:
          1. حمّل `MAWAQIT-Player.zip`
          2. فك الضغط
          3. شغّل `MAWAQIT-Player.exe`
          4. اختر ملف XAPK واضغط 🚀 تشغيل
        files: MAWAQIT-Player.zip
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
